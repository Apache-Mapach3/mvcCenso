<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Censo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4 mb-5">
    <h2>Formulario de Censo</h2>

    <form th:action="@{/censos/guardar}" th:object="${censo}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nombre del Censo:</label>
                <input type="text" th:field="*{nombre}" class="form-control" />
            </div>
            <div class="col-md-6 mb-3">
                <label>Fecha:</label>
                <input type="date" th:field="*{fecha}" class="form-control" />
            </div>
            <div class="col-md-4 mb-3"><label>País:</label><input type="text" th:field="*{pais}" class="form-control" /></div>
            <div class="col-md-4 mb-3"><label>Departamento:</label><input type="text" th:field="*{departamento}" class="form-control" /></div>
            <div class="col-md-4 mb-3"><label>Ciudad:</label><input type="text" th:field="*{ciudad}" class="form-control" /></div>
            <div class="col-md-6 mb-3"><label>Casa:</label><input type="text" th:field="*{casa}" class="form-control" /></div>
            <div class="col-md-6 mb-3"><label>Nombre del Sensador:</label><input type="text" th:field="*{nombreSensador}" class="form-control" /></div>

            <h4 class="mt-4">Datos de Población</h4>
            <div class="col-md-2 mb-3"><label>Hombres:</label><input type="number" th:field="*{numHombres}" class="form-control" value="0"/></div>
            <div class="col-md-2 mb-3"><label>Mujeres:</label><input type="number" th:field="*{numMujeres}" class="form-control" value="0"/></div>
            <div class="col-md-2 mb-3"><label>Ancianos (H):</label><input type="number" th:field="*{numAncianosHombres}" class="form-control" value="0"/></div>
            <div class="col-md-2 mb-3"><label>Ancianas (M):</label><input type="number" th:field="*{numAncianasMujeres}" class="form-control" value="0"/></div>
            <div class="col-md-2 mb-3"><label>Niños:</label><input type="number" th:field="*{numNinos}" class="form-control" value="0"/></div>
            <div class="col-md-2 mb-3"><label>Niñas:</label><input type="number" th:field="*{numNinas}" class="form-control" value="0"/></div>

            <h4 class="mt-4">Vivienda y Servicios</h4>
            <div class="col-md-6 mb-3"><label>Num Habitaciones:</label><input type="number" th:field="*{numHabitaciones}" class="form-control" value="0"/></div>
            <div class="col-md-6 mb-3"><label>Num Camas:</label><input type="number" th:field="*{numCamas}" class="form-control" value="0"/></div>

            <div class="col-md-12 mb-3">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" th:field="*{tieneAgua}">
                    <label class="form-check-label">Agua</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" th:field="*{tieneLuz}">
                    <label class="form-check-label">Luz</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" th:field="*{tieneAlcantarillado}">
                    <label class="form-check-label">Alcantarillado</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" th:field="*{tieneGas}">
                    <label class="form-check-label">Gas</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" th:field="*{tieneOtrosServicios}">
                    <label class="form-check-label">Otros Servicios</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-success mt-3">Guardar Registro</button>
        <a th:href="@{/censos}" class="btn btn-secondary mt-3">Cancelar</a>
    </form>
</div>
</body>
</html>
