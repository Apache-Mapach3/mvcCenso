<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Censos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Registros del Censo</h2>
    <a th:href="@{/censos/nuevo}" class="btn btn-primary mb-3">Registrar Nuevo Censo</a>
    <a th:href="@{/}" class="btn btn-secondary mb-3">Volver al Inicio</a>

    <div class="table-responsive">
        <table class="table table-bordered table-striped table-sm">
            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>País</th>
                <th>Ciudad</th>
                <th>Sensador</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="censo : ${censos}">
                <td th:text="${censo.nombre}">Nombre</td>
                <td th:text="${censo.fecha}">Fecha</td>
                <td th:text="${censo.ciudad}">Ciudad</td>
                <td th:text="${censo.nombreSensador}">Sensador</td>
                <td th:text="${censo.pais}">País</td>
                <td>
                    <a th:href="@{/censos/editar/{id}(id=${censo.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/censos/eliminar/{id}(id=${censo.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar registro?');">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
