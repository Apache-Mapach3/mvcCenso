<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${usuario.id == null ? 'Nuevo Usuario' : 'Editar Usuario'}">Formulario</h2>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post" class="mt-4" style="max-width: 500px;">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Nombre:</label>
            <input type="text" th:field="*{nombre}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Clave:</label>
            <input type="password" th:field="*{clave}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Rol:</label>
            <input type="text" th:field="*{rol}" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
