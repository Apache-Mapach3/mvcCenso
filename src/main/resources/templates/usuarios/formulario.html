<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            max-width: 520px;
            width: 100%;
            margin: auto;
        }
        .page-title {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .page-title span {
            background: linear-gradient(90deg, #63b3ed, #76e4f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .divider {
            border: none;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 1.5rem 0;
        }
        .form-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }
        .form-control {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #ffffff;
            padding: 0.65rem 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.09);
            border-color: #63b3ed;
            box-shadow: 0 0 0 3px rgba(99,179,237,0.15);
            color: #ffffff;
        }
        .form-control::placeholder { color: #ffffff }
        .btn-save {
            background: linear-gradient(90deg, #63b3ed, #76e4f7);
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,179,237,0.35);
            color: #1a1a2e;
        }
        .btn-cancel {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.65);
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }
        .input-icon-wrapper .form-control {
            padding-left: 2.2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">

        <h2 class="page-title mb-0">
            <i class="bi bi-person-fill me-2" style="color:#63b3ed;"></i>
            <span th:text="${usuario.id == null ? 'Nuevo' : 'Editar'}">Nuevo</span>
            <span> Usuario</span>
        </h2>

        <hr class="divider">

        <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre completo" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Clave</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" th:field="*{clave}" class="form-control" placeholder="Contraseña" required />
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Rol</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-shield"></i>
                    <input type="text" th:field="*{rol}" class="form-control" placeholder="Ej: Administrador" required />
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-save"><i class="bi bi-check-lg me-1"></i>Guardar</button>
                <a th:href="@{/usuarios}" class="btn btn-cancel text-center"><i class="bi bi-x-lg me-1"></i>Cancelar</a>
            </div>
        </form>

    </div>
</div>
</body>
</html>
