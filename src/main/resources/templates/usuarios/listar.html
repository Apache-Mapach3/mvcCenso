<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - Sistema de Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 2rem 0;
        }
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .page-title {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
        }
        .page-title span {
            background: linear-gradient(90deg, #63b3ed, #76e4f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-new {
            background: linear-gradient(90deg, #63b3ed, #76e4f7);
            border: none;
            color: #1a1a2e;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.5rem 1.2rem;
            transition: all 0.3s ease;
        }
        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,179,237,0.35);
            color: #1a1a2e;
        }
        .btn-back {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7);
            border-radius: 10px;
            padding: 0.5rem 1.2rem;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .divider {
            border: none;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 1.5rem 0;
        }
        .table-custom {
            color: rgba(255,255,255,0.85);
            border-collapse: separate;
            border-spacing: 0 6px;
        }
        .table-custom thead tr th {
            background: rgba(99,179,237,0.12);
            color: #63b3ed;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            padding: 0.9rem 1rem;
        }
        .table-custom thead tr th:first-child { border-radius: 10px 0 0 10px; }
        .table-custom thead tr th:last-child  { border-radius: 0 10px 10px 0; }
        .table-custom tbody tr td {
            background: rgba(255,255,255,0.03);
            border: none;
            padding: 0.9rem 1rem;
            vertical-align: middle;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .table-custom tbody tr td:first-child {
            border-left: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px 0 0 10px;
        }
        .table-custom tbody tr td:last-child {
            border-right: 1px solid rgba(255,255,255,0.05);
            border-radius: 0 10px 10px 0;
        }
        .table-custom tbody tr:hover td {
            background: rgba(255,255,255,0.06);
        }
        .id-badge {
            background: rgba(99,179,237,0.15);
            color: #63b3ed;
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .rol-badge {
            background: rgba(118,228,247,0.12);
            color: #76e4f7;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.8rem;
        }
        .btn-edit {
            background: rgba(237,191,63,0.15);
            border: 1px solid rgba(237,191,63,0.25);
            color: #edbf3f;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 0.82rem;
            transition: all 0.2s ease;
        }
        .btn-edit:hover {
            background: rgba(237,191,63,0.28);
            color: #edbf3f;
        }
        .btn-delete {
            background: rgba(252,129,129,0.12);
            border: 1px solid rgba(252,129,129,0.22);
            color: #fc8181;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 0.82rem;
            transition: all 0.2s ease;
        }
        .btn-delete:hover {
            background: rgba(252,129,129,0.25);
            color: #fc8181;
        }
        .empty-state {
            color: rgba(255,255,255,0.3);
            text-align: center;
            padding: 3rem 0;
        }
        .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
<div class="container py-2">
    <div class="glass-card">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h2 class="page-title mb-0"><i class="bi bi-people-fill me-2" style="color:#63b3ed;font-size:1.4rem;"></i>Gestión de <span>Usuarios</span></h2>
            <div class="d-flex gap-2">
                <a th:href="@{/usuarios/nuevo}" class="btn btn-new"><i class="bi bi-plus-lg me-1"></i>Nuevo Usuario</a>
                <a th:href="@{/}" class="btn btn-back"><i class="bi bi-house me-1"></i>Inicio</a>
            </div>
        </div>

        <hr class="divider">

        <div class="table-responsive">
            <table class="table table-custom w-100">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td><span class="id-badge" th:text="${usuario.id}">1</span></td>
                    <td th:text="${usuario.nombre}">Juan</td>
                    <td><span class="rol-badge" th:text="${usuario.rol}">Admin</span></td>
                    <td>
                        <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-edit me-1"><i class="bi bi-pencil-fill me-1"></i>Editar</a>
                        <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}" class="btn btn-delete" onclick="return confirm('¿Eliminar este usuario?');"><i class="bi bi-trash-fill me-1"></i>Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="4">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay usuarios registrados aún.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
</body>
</html>
